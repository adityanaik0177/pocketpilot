<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Expense | PocketPilot</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="dashboard-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <h1 class="page-title">Weekly Expense Overview</h1>
      <p class="page-subtitle">Visualizing your income and spending over the last 7 days.</p>

      <div class="glass-panel">
        <div class="chart-container">
          <canvas id="weeklyChart"></canvas>
        </div>
      </div>

    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    renderSidebar('weekly');

    // Get last 7 days data
    function getWeeklyData() {
      const labels = [];
      const debits = [0, 0, 0, 0, 0, 0, 0];
      const credits = [0, 0, 0, 0, 0, 0, 0];

      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        labels.push(d.toLocaleDateString('en-US', { weekday: 'short' }));

        const dayExpenses = window.appData.expenses.filter(e => {
          return new Date(e.date).toDateString() === d.toDateString();
        });

        dayExpenses.forEach(e => {
          if (e.type === 'debit') debits[6 - i] += e.amount;
          else credits[6 - i] += e.amount;
        });
      }

      return { labels, debits, credits };
    }

    const data = getWeeklyData();

    const ctx = document.getElementById('weeklyChart').getContext('2d');
    Chart.defaults.color = '#94a3b8';
    Chart.defaults.font.family = 'Inter';

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: data.labels,
        datasets: [
          {
            label: 'Spent (Debit)',
            data: data.debits,
            backgroundColor: 'rgba(239, 68, 68, 0.7)',
            borderColor: 'rgba(239, 68, 68, 1)',
            borderWidth: 1,
            borderRadius: 4
          },
          {
            label: 'Received (Credit)',
            data: data.credits,
            backgroundColor: 'rgba(16, 185, 129, 0.7)',
            borderColor: 'rgba(16, 185, 129, 1)',
            borderWidth: 1,
            borderRadius: 4
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'top',
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: {
              color: 'rgba(255, 255, 255, 0.1)'
            }
          },
          x: {
            grid: {
              display: false
            }
          }
        }
      }
    });

  </script>
</body>
</html>
