<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PocketPilot | Your Financial Copilot</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .hero-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .hero-title {
      font-size: 64px;
      font-weight: 700;
      background: linear-gradient(to right, #6366f1, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
    }
    .hero-subtitle {
      font-size: 20px;
      color: var(--text-secondary);
      max-width: 600px;
      margin-bottom: 48px;
    }
    .hero-btn {
      padding: 18px 48px;
      font-size: 20px;
      border-radius: 50px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="hero-section">
    <h1 class="hero-title">PocketPilot</h1>
    <p class="hero-subtitle">
      Take control of your daily, weekly, and monthly expenses with ease. Your ultimate financial copilot.
    </p>
    <a href="today.html" class="btn btn-primary hero-btn">Update Me Daily</a>
  </div>
</body>
</html>
