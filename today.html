<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today's Expense | PocketPilot</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="dashboard-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <h1 class="page-title">Today's Expense</h1>
      <p class="page-subtitle">Track your daily income and expenditures</p>

      <div class="grid-2" style="margin-bottom: 30px;">
        <div class="glass-panel">
          <h3>Debit Entry (Expense)</h3>
          <p style="color:var(--text-secondary); margin-bottom: 20px; font-size:14px;">Log what you spent today</p>
          <form id="debit-form">
            <div class="form-group">
              <label class="form-label">Category</label>
              <select class="form-control" id="debit-category" required>
                <option value="Food">Food</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Education">Education</option>
                <option value="Gift">Gift</option>
                <option value="Travel">Travel</option>
                <option value="Others">Others</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Amount</label>
              <input type="number" class="form-control" id="debit-amount" placeholder="0.00" required>
            </div>
            <div class="form-group">
              <label class="form-label">Description</label>
              <input type="text" class="form-control" id="debit-desc" placeholder="e.g. Lunch with friends">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Add Debit Entry</button>
          </form>
        </div>

        <div class="glass-panel">
          <h3>Credit Entry (Income)</h3>
          <p style="color:var(--text-secondary); margin-bottom: 20px; font-size:14px;">Log money received today</p>
          <form id="credit-form">
            <div class="form-group">
              <label class="form-label">Source</label>
              <input type="text" class="form-control" id="credit-source" placeholder="e.g. Salary, Friend" required>
            </div>
            <div class="form-group">
              <label class="form-label">Amount</label>
              <input type="number" class="form-control" id="credit-amount" placeholder="0.00" required>
            </div>
            <div class="form-group">
              <label class="form-label">Description</label>
              <input type="text" class="form-control" id="credit-desc" placeholder="Optional details">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Add Credit Entry</button>
          </form>
        </div>
      </div>

      <div class="glass-panel">
        <h3>Today's Transactions</h3>
        <div style="display: flex; gap: 20px; margin: 20px 0;">
          <div class="stat-card" style="background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); flex: 1;">
            <span class="stat-label">Total Received</span>
            <span class="stat-value credit" id="today-credit">₹0.00</span>
          </div>
          <div class="stat-card" style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); flex: 1;">
            <span class="stat-label">Total Spent</span>
            <span class="stat-value debit" id="today-debit">₹0.00</span>
          </div>
        </div>
        <ul class="entry-list" id="today-list">
          <!-- Transcation items injected via JS -->
        </ul>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    renderSidebar('today');

    function updateView() {
      const data = getDailyData();
      document.getElementById('today-credit').innerText = '₹' + data.credit.toFixed(2);
      document.getElementById('today-debit').innerText = '₹' + data.debit.toFixed(2);
      
      const list = document.getElementById('today-list');
      list.innerHTML = '';
      if(data.expenses.length === 0) {
        list.innerHTML = '<li class="entry-item"><span style="color: var(--text-secondary)">No transactions today.</span></li>';
        return;
      }

      data.expenses.forEach(e => {
        const sign = e.type === 'credit' ? '+' : '-';
        const colorClass = e.type === 'credit' ? 'credit' : 'debit';
        list.innerHTML += `
          <li class="entry-item">
            <div class="entry-info">
              <span class="entry-title">${e.type === 'credit' ? e.category : e.category + ' - ' + e.description}</span>
              <span class="entry-cat">${e.description || e.category}</span>
            </div>
            <span class="entry-amount ${colorClass}">${sign}₹${e.amount.toFixed(2)}</span>
          </li>
        `;
      });
    }

    document.getElementById('debit-form').addEventListener('submit', (e) => {
      e.preventDefault();
      addEntry('debit', 
        document.getElementById('debit-amount').value,
        document.getElementById('debit-category').value,
        document.getElementById('debit-desc').value
      );
      e.target.reset();
      updateView();
    });

    document.getElementById('credit-form').addEventListener('submit', (e) => {
      e.preventDefault();
      addEntry('credit', 
        document.getElementById('credit-amount').value,
        document.getElementById('credit-source').value,
        document.getElementById('credit-desc').value
      );
      e.target.reset();
      updateView();
    });

    updateView();
  </script>
</body>
</html>
