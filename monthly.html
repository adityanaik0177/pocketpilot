<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monthly Expense | PocketPilot</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="dashboard-layout">
    <div id="sidebar-container"></div>
    <main class="main-content">
      <h1 class="page-title">Monthly Expense Overview</h1>
      <p class="page-subtitle">Track your budget and compare with previous months.</p>

      <div id="alert-container"></div>

      <div class="grid-2">
        <!-- Budget Context -->
        <div class="glass-panel">
          <h3>Budget Status</h3>
          <div style="margin-top:20px; text-align:center;">
            <p class="stat-label">Budget Limit</p>
            <p class="stat-value" id="budget-limit" style="font-size:28px;">$0.00</p>
          </div>
          <div style="margin-top:20px; background: rgba(0,0,0,0.3); border-radius: 10px; height: 16px; overflow: hidden; position: relative;">
            <div id="budget-bar" style="height: 100%; width: 0%; background: var(--success); transition: width 0.5s ease;"></div>
          </div>
          <p id="budget-desc" style="margin-top: 10px; color: var(--text-secondary); text-align: center; font-size: 14px;"></p>
        </div>

        <!-- Monthly Comparison -->
        <div class="glass-panel">
          <h3>vs. Last Month</h3>
          <p style="color:var(--text-secondary); font-size:14px; margin-bottom: 20px;">Comparing total spending.</p>
          
          <div class="stat-card" style="padding: 0;">
            <span class="stat-label">Difference</span>
            <span class="stat-value" id="month-diff" style="font-size:28px;">$0.00</span>
            <p id="diff-desc" style="margin-top: 10px; color: var(--text-secondary); font-size: 14px;"></p>
          </div>
        </div>
      </div>

      <div class="glass-panel" style="margin-top: 24px;">
        <h3>Monthly Trend</h3>
        <div class="chart-container">
          <canvas id="monthlyChart"></canvas>
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    renderSidebar('monthly');

    function checkBudget(spent, budget) {
      const percentage = (spent / budget) * 100;
      const container = document.getElementById('alert-container');
      container.innerHTML = '';
      
      const bar = document.getElementById('budget-bar');
      bar.style.width = Math.min(percentage, 100) + '%';
      
      if (percentage >= 100) {
        bar.style.background = 'var(--danger)';
        container.innerHTML = '<div class="alert alert-danger" style="background:rgba(239, 68, 68, 0.2)"><strong>Alert:</strong> You have exceeded 100% of your budget!</div>';
      } else if (percentage >= 80) {
        bar.style.background = 'var(--warning)';
        container.innerHTML = '<div class="alert alert-warning"><strong>Notice:</strong> You have reached 80% of your monthly budget.</div>';
      } else if (percentage >= 50) {
        bar.style.background = '#eab308'; // softer yellow
        container.innerHTML = '<div class="alert" style="background:rgba(234, 179, 8, 0.2); border:1px solid #eab308; color:#fde047;"><strong>Update:</strong> You are halfway through your budget (50%).</div>';
      } else {
        bar.style.background = 'var(--success)';
      }

      document.getElementById('budget-desc').innerText = `${percentage.toFixed(1)}% Used ($${spent.toFixed(2)} / $${budget.toFixed(2)})`;
    }

    function compareLastMonth(currentDebit, prevDebit) {
      const diffElement = document.getElementById('month-diff');
      const descElement = document.getElementById('diff-desc');
      
      const diff = currentDebit - prevDebit;
      
      if (prevDebit === 0) {
        diffElement.innerText = "N/A";
        descElement.innerText = "No data from last month to compare.";
        diffElement.style.color = "var(--text-secondary)";
        return;
      }

      if (diff > 0) {
        diffElement.innerText = `+$${diff.toFixed(2)}`;
        diffElement.className = 'stat-value debit';
        descElement.innerText = "You spent more this month compared to the last month.";
      } else if (diff < 0) {
        diffElement.innerText = `-$${Math.abs(diff).toFixed(2)}`;
        diffElement.className = 'stat-value credit';
        descElement.innerText = "Great job! You saved more this month compared to the last month.";
      } else {
        diffElement.innerText = "$0.00";
        descElement.innerText = "Your spending is exactly identical to last month.";
      }
    }

    // Process and display data
    const d = new Date();
    const currentMonthData = getMonthlyData(d.getMonth(), d.getFullYear());
    
    // Get previous month data
    let prevM = d.getMonth() - 1;
    let prevY = d.getFullYear();
    if (prevM < 0) { prevM = 11; prevY--; }
    const prevMonthData = getMonthlyData(prevM, prevY);

    const budgetLimit = window.appData.settings.monthlyBudget || 5000;
    document.getElementById('budget-limit').innerText = `$${parseFloat(budgetLimit).toFixed(2)}`;
    
    checkBudget(currentMonthData.debit, budgetLimit);
    compareLastMonth(currentMonthData.debit, prevMonthData.debit);

    // Chart.js graph for current month divided into 4 weeks approx
    function renderMonthlyGraph(monthlyExpenses) {
      const ctx = document.getElementById('monthlyChart').getContext('2d');
      Chart.defaults.color = '#94a3b8';
      Chart.defaults.font.family = 'Inter';

      // Aggregate into 4 weeks
      const weeklySpent = [0, 0, 0, 0];
      monthlyExpenses.filter(e => e.type === 'debit').forEach(e => {
        const date = new Date(e.date).getDate();
        if (date <= 7) weeklySpent[0] += e.amount;
        else if (date <= 14) weeklySpent[1] += e.amount;
        else if (date <= 21) weeklySpent[2] += e.amount;
        else weeklySpent[3] += e.amount;
      });

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4+'],
          datasets: [{
            label: 'Total Expenses',
            data: weeklySpent,
            borderColor: 'rgba(99, 102, 241, 1)',
            backgroundColor: 'rgba(99, 102, 241, 0.2)',
            borderWidth: 2,
            pointBackgroundColor: 'rgba(99, 102, 241, 1)',
            pointRadius: 4,
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: 'rgba(255, 255, 255, 0.1)' }
            },
            x: {
              grid: { display: false }
            }
          }
        }
      });
    }

    renderMonthlyGraph(currentMonthData.expenses);
  </script>
</body>
</html>
